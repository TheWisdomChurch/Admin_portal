name: CI (Admin Portal)

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - develop

concurrency:
  group: admin-portal-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit / component tests (Vitest)
        run: npm run test

      - name: Build
        run: npm run build
        env:
          # Placeholder values — this job never talks to a real backend;
          # it only needs the build to succeed.
          NEXT_PUBLIC_BACKEND_URL: https://example.invalid
          NEXT_PUBLIC_API_URL: https://example.invalid/api/v1
          APP_ADMIN_PORTAL_URL: https://example.invalid

  # E2E runs separately and only when repo secrets for a staging backend are
  # configured — see README's "Testing" section for why this repo has no
  # mock backend and what env vars this job expects. Skips cleanly on forks
  # / PRs from contributors without access to those secrets.
  e2e:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    if: ${{ vars.E2E_BASE_URL != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e critical paths
        run: npm run test:e2e
        env:
          E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_SUPER_ADMIN_EMAIL: ${{ secrets.E2E_SUPER_ADMIN_EMAIL }}
          E2E_SUPER_ADMIN_PASSWORD: ${{ secrets.E2E_SUPER_ADMIN_PASSWORD }}
          E2E_LOGIN_OTP_CODE: ${{ secrets.E2E_LOGIN_OTP_CODE }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

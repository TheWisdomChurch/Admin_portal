name: Build & Push (Admin Portal)

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: admin-portal-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          version: latest

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/thewisdomchurch/wisdom-admin
          tags: |
            type=raw,value=main
            type=sha,format=short
            type=ref,event=tag

      - name: Build and push (stable)
        uses: docker/build-push-action@v7
        env:
          BUILDKIT_PROGRESS: plain
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          target: production
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

          # disable provenance attestation for now
          provenance: false
          sbom: false

          build-args: |
            NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            APP_ADMIN_PORTAL_URL=${{ secrets.APP_ADMIN_PORTAL_URL }}

          # use registry-backed cache instead of gha cache
          cache-from: type=registry,ref=ghcr.io/thewisdomchurch/wisdom-admin:buildcache
          cache-to: type=registry,ref=ghcr.io/thewisdomchurch/wisdom-admin:buildcache,mode=max